{% extends 'training/base.html' %}

{% block title %}Inicio{% endblock %}

{% block content %}
<h1>SprintTrack</h1>
<p>App para registrar y analizar entrenamientos de velocidad.</p>

{% if user.is_authenticated %}
    <a class="btn btn-primary me-2" href="{% url 'dashboard' %}">Ir al dashboard</a>
    <a class="btn btn-success" href="{% url 'session_create' %}">Añadir entrenamiento</a>
{% else %}
    <a class="btn btn-primary me-2" href="{% url 'login' %}">Iniciar sesión</a>
    <a class="btn btn-success" href="{% url 'register' %}">Registrarse</a>
{% endif %}
{% endblock %}

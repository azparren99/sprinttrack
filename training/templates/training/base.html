<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}SprintTrack{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand text-white text-decoration-none" href="{% url 'home' %}">
        SprintTrack
    </a>

    <div class="ms-auto">

        {% if user.is_authenticated %}

            <span class="text-white me-3">
                Hola {{ user.username }}
            </span>

            <a class="btn btn-outline-light me-2" href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a class="btn btn-outline-light me-2" href="{% url 'session_list' %}">
                Entrenamientos
            </a>

            <a class="btn btn-outline-light me-2" href="{% url 'session_create' %}">
                Nuevo entreno
            </a>

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-danger">
                    Cerrar sesión
                </button>
            </form>

        {% else %}

            <a class="btn btn-primary me-2" href="{% url 'login' %}">
                Iniciar sesión
            </a>

            <a class="btn btn-success" href="{% url 'register' %}">
                Registrarse
            </a>

        {% endif %}

    </div>

</nav>


<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>


</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}SprintTrack{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'training/css/styles.css' %}">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4 py-3">
    <a class="navbar-brand fw-bold fs-3 text-white text-decoration-none" href="{% url 'home' %}">
        SprintTrack
    </a>

    <div class="ms-auto d-flex align-items-center gap-2 flex-wrap">
        {% if user.is_authenticated %}

            <span class="text-white me-2 welcome-text">
                Hola {{ user.username }}
            </span>

            <a class="btn btn-outline-light nav-btn" href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a class="btn btn-outline-light nav-btn" href="{% url 'session_list' %}">
                Entrenamientos
            </a>

            <a class="btn btn-light nav-btn" href="{% url 'session_create' %}">
                Nuevo entreno
            </a>

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-danger nav-btn">
                    Cerrar sesión
                </button>
            </form>

        {% else %}

            <a class="btn btn-light nav-btn" href="{% url 'login' %}">
                Iniciar sesión
            </a>

            <a class="btn btn-success nav-btn" href="{% url 'register' %}">
                Registrarse
            </a>

        {% endif %}
    </div>
</nav>

<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
